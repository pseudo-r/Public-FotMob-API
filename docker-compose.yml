services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fotmob_db
      POSTGRES_USER: fotmob
      POSTGRES_PASSWORD: fotmob_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fotmob"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./fotmob_service
      target: builder
    command: python manage.py runserver 0.0.0.0:8000
    working_dir: /app
    volumes:
      - ./fotmob_service:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DATABASE_URL: postgres://fotmob:fotmob_pass@db:5432/fotmob_db
      CELERY_BROKER_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./fotmob_service
      target: builder
    command: celery -A config.celery worker -l info
    working_dir: /app
    volumes:
      - ./fotmob_service:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DATABASE_URL: postgres://fotmob:fotmob_pass@db:5432/fotmob_db
      CELERY_BROKER_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key
    depends_on:
      - redis
      - web

volumes:
  postgres_data:
